services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-openmaic}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-openmaic_secret}
      POSTGRES_DB: ${POSTGRES_DB:-openmaic}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-openmaic} -d ${POSTGRES_DB:-openmaic}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.production
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-openmaic}:${POSTGRES_PASSWORD:-openmaic_secret}@postgres:5432/${POSTGRES_DB:-openmaic}
    command: npx prisma migrate deploy
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  openmaic:
    build:
      context: .
      dockerfile: Dockerfile.production
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-openmaic}:${POSTGRES_PASSWORD:-openmaic_secret}@postgres:5432/${POSTGRES_DB:-openmaic}
    volumes:
      # Optional: mount server-providers.yml for provider config
      # - ./server-providers.yml:/app/server-providers.yml:ro
      - openmaic-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  postgres-data:
  openmaic-data:
